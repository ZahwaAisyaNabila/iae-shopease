services:
  # Nginx web server
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/public:ro
    depends_on:
      order-app:
        condition: service_started
    networks:
      - order-network

  # Laravel application container (PHP-FPM)
  order-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=order-service
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - APP_DEBUG=true
      - APP_ENV=local
      - APP_URL=http://localhost:8000
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Queue worker
  order-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: php artisan queue:work redis --sleep=3 --tries=3
    depends_on:
      - order-app
      - redis
      - mysql
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=order-service
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - APP_DEBUG=true
      - APP_ENV=local
    networks:
      - order-network

  # MySQL database
  mysql:
    image: mysql:8.0
    container_name: order-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: order-service
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ALLOW_EMPTY_PASSWORD: 0
    volumes:
      - order-mysql-data:/var/lib/mysql
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis cache and queue
  redis:
    image: redis:7-alpine
    container_name: order-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - order-redis-data:/data
    networks:
      - order-network

volumes:
  order-mysql-data:
  order-redis-data:

networks:
  order-network:
    driver: bridge
