services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  user-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secret
    volumes: [user-postgres-data:/var/lib/postgresql/data]

  order-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: order_service
      MYSQL_ROOT_PASSWORD: secret
    volumes: [order-db-data:/var/lib/mysql]

  notification-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: notification_service
      MYSQL_ROOT_PASSWORD: secret
    volumes: [notification-db-data:/var/lib/mysql]

  user-service:
    build: ./user-service
    command: sh -c "until php artisan migrate --force; do sleep 5; done; php artisan serve --host=0.0.0.0 --port=8000"
    ports: ["8001:8000"]
    depends_on: [user-db]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:2bFozh04O2QRMqDLcDCwuuy6KoBQBkdGQj3wgAqIyA4=
      DB_CONNECTION: pgsql
      DB_HOST: user-db
      DB_PORT: 5432
      DB_DATABASE: user_service
      DB_USERNAME: root
      DB_PASSWORD: secret

  user-hasura:
    image: hasura/graphql-engine:latest
    ports: ["8080:8080"]
    depends_on: [user-db]
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://root:secret@user-db:5432/user_service
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://root:secret@user-db:5432/user_service
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: secret

  product-service:
    build: ./product-service
    command: sh -c "touch database/database.sqlite && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    ports: ["8003:8000"]
    depends_on: [redis]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:2bFozh04O2QRMqDLcDCwuuy6KoBQBkdGQj3wgAqIyA4=
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      REDIS_HOST: redis
      QUEUE_CONNECTION: sync

  order-service:
    build: ./order-service
    command: sh -c "until php artisan migrate --force; do sleep 5; done; php artisan serve --host=0.0.0.0 --port=8000"
    ports: ["8002:8000"]
    depends_on: [order-db, redis]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:2bFozh04O2QRMqDLcDCwuuy6KoBQBkdGQj3wgAqIyA4=
      DB_CONNECTION: mysql
      DB_HOST: order-db
      DB_PORT: 3306
      DB_DATABASE: order_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: sync

  notification-service:
    build: ./notification-service
    command: sh -c "until php artisan migrate --force; do sleep 5; done; php artisan serve --host=0.0.0.0 --port=8000"
    ports: ["8004:8000"]
    depends_on: [notification-db, redis]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:2bFozh04O2QRMqDLcDCwuuy6KoBQBkdGQj3wgAqIyA4=
      DB_CONNECTION: mysql
      DB_HOST: notification-db
      DB_PORT: 3306
      DB_DATABASE: notification_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: sync

  notification-event-consumer:
    build: ./notification-service
    command: sh -c "until php artisan orders:subscribe; do sleep 5; done"
    depends_on: [notification-db, redis, notification-service]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:2bFozh04O2QRMqDLcDCwuuy6KoBQBkdGQj3wgAqIyA4=
      DB_CONNECTION: mysql
      DB_HOST: notification-db
      DB_PORT: 3306
      DB_DATABASE: notification_service
      DB_USERNAME: root
      DB_PASSWORD: secret
      REDIS_HOST: redis

volumes:
  user-postgres-data:
  order-db-data:
  notification-db-data:
